<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Заявка</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<link rel="stylesheet" href="mockup.css">
</head>
<body class="site-body mockup-page">
<p class="mockup-label">Макет 390×844 — Заявка</p>
<header class="site-header">
  <nav class="navbar container-fluid px-3 py-2">
    <span class="navbar-brand brand-logo mb-0">КОНФЕРЕНЦИИРФ</span>
  </nav>
</header>
<main class="container py-3 px-3">

<h1 class="page-title">Оформление заявки</h1>
<div class="card-form">
  <label class="form-label">Помещение</label>
  <select class="form-select mb-3">
    <option>— Выберите —</option>
    <option>Аудитория «Север»</option>
    <option>Коворкинг «Точка»</option>
    <option>Кинозал «Панорама»</option>
  </select>
  <label class="form-label">Дата (ДД-ММ-ГГГГ)</label>
  <input class="form-control mb-3" placeholder="18-05-2026">
  <label class="form-label">Время</label>
  <input type="time" class="form-control mb-3" value="10:00">
  <label class="form-label">Способ оплаты</label>
  <select class="form-select mb-3">
    <option>Наличные</option>
    <option>Перевод</option>
  </select>
  <button class="btn btn-primary w-100">Отправить заявку</button>
</div>

</main>
<footer class="site-footer mt-auto">
  <p class="footer-text text-center mb-0">Каталог конференций РФ</p>
</footer>

</body>
</html>
