<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Личный кабинет</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<link rel="stylesheet" href="mockup.css">
</head>
<body class="site-body mockup-page">
<p class="mockup-label">Макет 390×844 — Личный кабинет</p>
<header class="site-header">
  <nav class="navbar container-fluid px-3 py-2">
    <span class="navbar-brand brand-logo mb-0">КОНФЕРЕНЦИИРФ</span>
  </nav>
</header>
<main class="container py-3 px-3">

<h1 class="page-title">Личный кабинет</h1>
<p class="page-lead">Иванов И.И.</p>

<section class="hero-slider mb-3" data-slider data-interval="3000">
  <div class="slider-viewport"><div class="slider-track">
    <div class="slider-slide active"><img src="../static/images/slider-1.svg" alt="1" style="width:100%"></div>
    <div class="slider-slide"><img src="../static/images/slider-2.svg" alt="2" style="width:100%"></div>
    <div class="slider-slide"><img src="../static/images/slider-3.svg" alt="3" style="width:100%"></div>
    <div class="slider-slide"><img src="../static/images/slider-4.svg" alt="4" style="width:100%"></div>
  </div></div>
  <button type="button" class="slider-btn slider-prev" data-slider-prev>&lsaquo;</button>
  <button type="button" class="slider-btn slider-next" data-slider-next>&rsaquo;</button>
  <div class="slider-dots" data-slider-dots></div>
</section>

<article class="booking-card">
  <strong>#1 Аудитория «Север»</strong>
  <span class="status-badge status-new float-end">Новое</span>
  <p class="body-text mb-0 mt-1">18-05-2026 10:00 · Наличные</p>
</article>
<article class="booking-card">
  <strong>#2 Коворкинг</strong>
  <span class="status-badge status-assigned float-end">Мероприятие назначено</span>
  <p class="body-text mb-1 mt-1">20-05-2026 · Перевод</p>
  <label class="form-label">Отзыв</label>
  <textarea class="form-control form-control-sm mb-2" rows="2"></textarea>
  <button class="btn btn-sm btn-outline-primary">Отправить</button>
</article>
<a href="booking.html" class="btn btn-primary w-100 mt-2">Новая заявка</a>

</main>
<footer class="site-footer mt-auto">
  <p class="footer-text text-center mb-0">Каталог конференций РФ</p>
</footer>
<script src="../static/js/slider.js"></script>
</body>
</html>
