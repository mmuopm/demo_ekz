{% extends "base.html" %}
{% block title %}Вход администратора{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<h1 class="page-title">Вход администратора</h1>
<form method="post" class="card-form">{% csrf_token %}
  <div class="mb-3"><label class="form-label">Логин</label><input name="login" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">Пароль</label><input type="password" name="password" class="form-control" required></div>
  <button class="btn btn-primary w-100">Войти</button>
</form>
</div></div>
{% endblock %}
