{% extends "base.html" %}
{% block title %}Авторизация{% endblock %}
{% block content %}
<section class="auth-section animate-fade-in">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h1 class="page-title">Авторизация</h1>
      <p class="page-lead">Вход по логину и паролю.</p>
      <form method="post" class="card-form">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="login">Логин</label>
          <input class="form-control" id="login" name="login" value="{{ login_value|default:'' }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Пароль</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100">Войти</button>
      </form>
      <p class="auth-switch mt-3 body-text">Ещё не зарегистрированы? <a href="{% url 'catalog:register' %}">Регистрация</a></p>
    </div>
  </div>
</section>
{% endblock %}
