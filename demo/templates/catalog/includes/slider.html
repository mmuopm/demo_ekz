{% load static %}
<section class="hero-slider mt-4" data-slider data-interval="3000" aria-label="Галерея">
    <div class="slider-viewport">
        <div class="slider-track">
            <div class="slider-slide active">
                <img src="{% static 'images/1.svg' %}" alt="Аудитория" width="800" height="400">
            </div>
            <div class="slider-slide">
                <img src="{% static 'images/2.svg' %}" alt="Коворкинг" width="800" height="400">
            </div>
            <div class="slider-slide">
                <img src="{% static 'images/3.svg' %}" alt="Кинозал" width="800" height="400">
            </div>
            <div class="slider-slide">
                <img src="{% static 'images/4.svg' %}" alt="Конференция" width="800" height="400">
            </div>
        </div>
    </div>
    <button type="button" class="slider-btn slider-prev" data-slider-prev>&lsaquo;</button>
    <button type="button" class="slider-btn slider-next" data-slider-next>&rsaquo;</button>
    <div class="slider-dots" data-slider-dots></div>
</section>
